name: Auto Update Hanta Tracker

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: 

# This explicitly tells GitHub the robot has permission to write changes
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Updated to v4 (Node 24 Compatible)
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Updated to v5 (Node 24 Compatible)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install Dependencies
        run: pip install requests

      - name: Run Update Script
        run: python update_stats.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'Hanta-Tracker-Bot'
          git config --global user.email 'bot@everythingtoday.in'
          git add data.json
          git commit -m "Automated Data Update: $(date)" || echo "No changes to commit"
          git push
